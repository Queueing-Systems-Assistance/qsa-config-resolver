plugins {
	id "org.sonarqube" version "2.7"
	id 'org.springframework.boot' version '2.2.4.RELEASE'
	id 'io.spring.dependency-management' version '1.0.9.RELEASE'
	id("maven-publish")
}

ext {
	/* Plugin Information */
	jdkVersion = '11'
	checkstyleVersion = '8.17'
	/* Project Information */
	projectGroup = 'com.unideb.qsa'
	projectMajorVersion = '1'
	projectMinorVersion = '0'
	projectBuildVersion = System.getenv('TRAVIS_BUILD_NUMBER') ?: '0-SNAPSHOT'
	projectVersion = projectMajorVersion + '.' + projectMinorVersion + '.' + projectBuildVersion
	/* Secrets */
	githubToken = System.getenv('GITHUB_TOKEN') ?: ''
	githubUsername = System.getenv('GITHUB_USERNAME') ?: ''
	// Note: Use your own name and token
	githubOwnUsername = System.getenv('GITHUB_OWN_USERNAME') ?: 'YOUR_USERNAME'
	githubOwnToken = System.getenv('GITHUB_OWN_TOKEN') ?: 'YOUR_TOKEN'
}

group = projectGroup
version = projectVersion

apply plugin: 'maven'
apply plugin: 'checkstyle'
apply plugin: 'java'
apply plugin: 'java-library'

repositories {
	mavenLocal()
	mavenCentral()
	jcenter()
	maven {
		url 'https://jitpack.io'
	}
	maven {
		url 'https://maven.pkg.github.com/queueing-systems-assistance/qsa'
		credentials {
			username = githubOwnUsername
			password = githubOwnToken
		}
	}
}

checkstyle {
	setToolVersion(checkstyleVersion)
	configFile = file("${rootDir}/support/code-formatting/checkstyle/checkstyle.xml")
	configDir = file("${rootDir}/support/code-formatting/checkstyle/")
	showViolations = true
	ignoreFailures = false
}

sonarqube {
	properties {
		property 'sonar.projectVersion', projectVersion
	}
}

dependencies {
	implementation group: 'com.unideb.qsa', name: 'qsa-config-domain', version: '1.0.2'

	implementation group: 'ch.qos.logback', name: 'logback-classic', version: '1.2.3'
	implementation group: 'ch.qos.logback', name: 'logback-core', version: '1.2.3'
	implementation group: 'ch.qos.logback.contrib', name: 'logback-jackson', version: '0.1.5'
	implementation group: 'ch.qos.logback.contrib', name: 'logback-json-classic', version: '0.1.5'
	implementation group: 'net.logstash.logback', name: 'logstash-logback-encoder', version: '6.0'
	implementation group: 'org.slf4j', name: 'jcl-over-slf4j', version: '1.7.26'
	implementation group: 'org.slf4j', name: 'slf4j-api', version: '1.7.26'
	implementation group: 'ch.qos.logback', name: 'logback-classic', version: '1.2.3'
	implementation group: 'com.google.code.gson', name: 'gson', version: '2.8.5'
	implementation group: 'com.google.guava', name: 'guava', version: '14.0.1'
	implementation group: 'commons-io', name: 'commons-io', version: '2.6'
	implementation group: 'org.springframework', name: 'spring-core', version: '5.2.3.RELEASE'
	implementation group: 'org.springframework', name: 'spring-context', version: '5.1.9.RELEASE'
	implementation group: 'org.springframework', name: 'spring-instrument', version: '5.1.9.RELEASE'
	implementation group: 'org.springframework', name: 'spring-tx', version: '5.1.9.RELEASE'
	implementation group: 'org.springframework.boot', name: 'spring-boot-starter', version: '2.2.4.RELEASE'
	implementation group: 'org.springframework.boot', name: 'spring-boot-autoconfigure-processor', version: '2.2.4.RELEASE'
	implementation group: 'org.springframework', name: 'spring-web', version: '5.2.3.RELEASE'
	implementation group: 'org.springframework.boot', name: 'spring-boot-starter-cache', version: '2.2.4.RELEASE'
}

publishing {
	repositories {
		maven {
			name = 'GitHubPackages'
			url = uri('https://maven.pkg.github.com/queueing-systems-assistance/qsa')
			credentials {
				username = githubUsername
				password = githubToken
			}
		}
	}
	publications {
		gpr(MavenPublication) {
			from(components.java)
		}
	}
}

sourceCompatibility = jdkVersion

tasks.withType(JavaCompile) {
	options.encoding = 'UTF-8'
}

bootJar {
	enabled = false
}

jar {
	enabled = true
}
